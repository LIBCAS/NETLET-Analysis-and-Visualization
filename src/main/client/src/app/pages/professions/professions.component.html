@if (loading) {
<mat-progress-bar mode="indeterminate" class="app-loading"></mat-progress-bar>
}
<as-split direction="horizontal" [unit]="'pixel'" (gutterClick)="state.gutterClick($event)">
  <as-split-area [size]="state.facetsSize">
    <div style="flex: 1 30%;" class="app-filters">
      @if(solrResponse?.facets) {
      <app-facets
        [fields]="['authors', 'recipients', 'mentioned','keyword_categories', 'keywords', 'professions', 'origins', 'destinations']"
        [facets]="facets()" (onMouserOver)="showNode($event)" (onMouseOut)="hideNode()"></app-facets> }
    </div>
  </as-split-area>
  <as-split-area>
    <div class="app-fill-w" style="overflow: auto; ">
    <div class="app-years">
      @if (solrResponse?.facets.date_year) {
      <app-years-chart [dateYearFacet]="solrResponse.facets.date_year"
        (onChangeLimits)="changeLimits($event)"></app-years-chart>
      }
    </div>
    <div>
      <mat-expansion-panel class="mat-mdc-elevation-specific mat-elevation-z0" [expanded]="true">
        <mat-expansion-panel-header>
          <mat-panel-title> {{ 'identities_to_show' | translate}} </mat-panel-title>
        </mat-expansion-panel-header>
        <mat-checkbox [(ngModel)]="includeAuthors" (change)="processResponse(true)">{{ 'field.authors' |
          translate}}</mat-checkbox>
        <mat-checkbox [(ngModel)]="includeRecipients" (change)="processResponse(true)">{{ 'field.recipients' |
          translate}}</mat-checkbox>
      </mat-expansion-panel>
    </div>
    <div class="app-fill-w" style="overflow: auto; ">
      <mat-card appearance="outlined">
        <mat-card-content>
          <div style="overflow: auto; height:400px; ">
            <div echarts style="width: 100%; height:100%;" [options]="pieOptions" (chartInit)="onPieChartInit($event)">
            </div>
          </div>
        </mat-card-content></mat-card>
      <mat-card appearance="outlined">
        <mat-card-content>
          <div style="overflow: auto; height:500px; ">
            <div echarts style="width: 100%; height:100%;" [options]="graphOptions"
              (chartInit)="onGraphChartInit($event)">
            </div>
          </div>
        </mat-card-content></mat-card>
    </div>
  </div>
  </as-split-area>
</as-split>
@if (invalidTenant) {
<mat-card appearance="outlined" class="app-invalidTenant">
  <mat-card-header>
    <mat-card-title> {{ 'invalidTenant' | translate}} </mat-card-title>
  </mat-card-header>
</mat-card>
}
